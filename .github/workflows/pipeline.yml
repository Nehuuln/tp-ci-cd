name: PIPELINE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            nehuuln/tp-ci-cd-api:latest
            nehuuln/tp-ci-cd-api:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/tp-ci-cd
            git pull
            kubectl apply -f k8s/db-deployment.yaml
            kubectl -n app create secret generic db-secret --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -f k8s/api-deployment.yaml
            kubectl -n app set image deployment/api api=nehuuln/tp-ci-cd-api:${{ github.sha }}
            kubectl -n app rollout status deployment/api