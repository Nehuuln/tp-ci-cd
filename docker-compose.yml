services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: app_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: appuser
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: appdb
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: app_api
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 27017
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  db_data: